<div class="modal-overlay" id="create-album-modal" style="display:none">
    <div class="modal-content">
        <h2>Create New Album</h2>
        <form id="create-album-form">
            <div class="form-group">
                <label for="album-title">Album Title</label>
                <input type="text" id="album-title" name="title" required placeholder="e.g., Summer Vacation">
            </div>
            <div class="form-group">
                <label for="album-date">Date</label>
                <input type="date" id="album-date" name="date" required>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeCreateAlbum()">Cancel</button>
                <button type="submit" class="btn btn-primary">Create Album</button>
            </div>
        </form>
    </div>
</div>

<style>
.modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.modal-content {
    background: #fff;
    padding: 2rem;
    border-radius: 8px;
    width: 100%;
    max-width: 400px;
}
.modal-content h2 {
    margin-bottom: 1rem;
}
.form-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
    margin-top: 1.5rem;
}
</style>

<script>
function openCreateAlbum() {
    document.getElementById("create-album-modal").style.display = "flex";
    document.getElementById("album-date").value = new Date().toISOString().split("T")[0];
}

function closeCreateAlbum() {
    document.getElementById("create-album-modal").style.display = "none";
}

document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("create-album-form");
    if (form) {
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const title = document.getElementById("album-title").value;
            const date = document.getElementById("album-date").value;
            try {
                await App.api.post("/api/albums", { title, date });
                closeCreateAlbum();
                location.reload();
            } catch (err) {
                alert("Failed to create album");
            }
        });
    }
});
</script>
