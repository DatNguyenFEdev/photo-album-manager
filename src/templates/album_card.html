<div class="album-card" data-album-id="{{ album.id }}" data-order="{{ album.display_order }}">
    <a href="/album/{{ album.id }}" class="album-card-link">
        <div class="album-card-thumb">
            <span class="album-card-placeholder">&#128247;</span>
        </div>
        <div class="album-card-info">
            <h3 class="album-card-title">{{ album.title }}</h3>
            <span class="album-card-date">{{ album.date }}</span>
        </div>
    </a>
</div>
